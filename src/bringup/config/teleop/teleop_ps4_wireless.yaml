# Reference: https://github.com/ros-drivers/joystick_drivers/blob/ros2/joy/README.md
joy:
  ros__parameters:
    device_name: "Wireless Controller"
    deadzone: 0.05
    autorepeat_rate: 20.0

# Reference: https://github.com/ros2/teleop_twist_joy/blob/rolling/README.md
teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 1.2
    scale_linear_turbo:
      x: 1.5

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 1.0
    scale_angular_turbo:
      yaw: 1.5

    enable_button: 5 # R1 shoulder button
    enable_turbo_button: 4  # L1 shoulder button
