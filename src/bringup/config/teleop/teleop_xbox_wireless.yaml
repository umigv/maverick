joy:
  ros__parameters:
    device_name: "Xbox One Elite 2 Controller"
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 1.2
    scale_linear_turbo:
      x: 1.5

    axis_angular:
      yaw: 2
    scale_angular:
      yaw: 1.0
    scale_angular_turbo:
      yaw: 1.5

    enable_button: 7 # RB shoulder button
    enable_turbo_button: 6  # LB shoulder button
