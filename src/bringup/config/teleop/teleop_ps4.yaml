joy:
  ros__parameters:
    device_name: "Sony Interactive Entertainment Wireless Controller"
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 1.2
    scale_linear_turbo:
      x: 1.8

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 2.0
    scale_angular_turbo:
      yaw: 2.0

    enable_button: 5 # R1 shoulder button
    enable_turbo_button: 4  # L1 shoulder button
