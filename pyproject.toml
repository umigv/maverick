[tool.pixi.workspace]
name = "maverick"
channels = ["https://prefix.dev/robostack-humble", "https://prefix.dev/conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[tool.pixi.feature.ros.dependencies]
# Build toolchain
ccache = "*"
colcon-common-extensions = "*"
pkg-config = "*"
compilers = "*"
ninja = "*"
python = "3.11*"

# Workspace dependencies
geographiclib-cpp = "*"
matplotlib-base = "*"
numpy = "*"
pyproj = "*"
pyserial = "*"
# ROS 2 launch_testing's pytest plugin uses the pre-8.0 pytest_pycollect_makemodule(path, ...)
# hook signature; pytest 8 removed the `path` arg, breaking pytest collection entirely.
pytest = "<8"
pyubx2 = "*"
# setuptools 80 removed the `develop` command that colcon's ament_python editable installs rely on
setuptools = "<80"
ros-humble-foxglove-bridge = "*"
ros-humble-foxglove-msgs = "*"
ros-humble-geographic-msgs = "*"
ros-humble-joint-state-publisher = "*"
ros-humble-joy = "*"
ros-humble-robot-localization = "*"
ros-humble-robot-state-publisher = "*"
ros-humble-ros-base = "*"
ros-humble-rviz2 = "*"
ros-humble-teleop-twist-joy = "*"
ros-humble-twist-mux = "*"
ros-humble-urdf-launch = "*"
ros-humble-xacro = "*"
types-pyyaml = "*"

[tool.pixi.feature.ros.pypi-dependencies]
odrive = "*"
# playsound is broken above 1.2.2
playsound = "==1.2.2"
types-pyserial = "*"

[tool.pixi.feature.ros.activation]
scripts = ["install/setup.bash"]

[tool.pixi.feature.ros.activation.env]
RCUTILS_COLORIZED_OUTPUT = "1"

[tool.pixi.feature.tooling.dependencies]
ruff = "*"
mypy = "*"
# Pin to version matching what Ubuntu ships with the ROS distro we use
clang-format = "14.*"

[tool.pixi.environments]
default = { features = ["ros", "tooling"], solve-group = "default" }

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "build",
    "install",
    "log",
]

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # import sorting
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
    "RUF",  # ruff rules
    "A",    # builtins shadowing
    "C4",   # comprehension optimizations
    "PIE",  # misc correctness
    "ISC",  # string concat issues
    "PTH",  # use pathlib instead of os.path
    "RET",  # return-statement hygiene
    "FURB", # refurb - modernizations
    "DTZ",  # timezone-aware datetimes
    "ICN",  # import conventions (numpy as np, etc.)
    "LOG",  # logging-call correctness
    "N",    # pep8 naming
    "D",    # pydocstyle (replaces ament_pep257)
]
ignore = [
    "E501", # allow long lines that the formatter does not rewrite
    "D1",   # don't require docstrings; only check formatting of the ones that exist
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.mypy]
python_version = "3.11"

# Output
pretty = true
show_error_codes = true

# Strictness
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_ignores = true
strict_equality = true
extra_checks = true
enable_error_code = [
    "ignore-without-code", # require # type: ignore[code], not bare ignores
    "redundant-expr",
    "possibly-undefined",
    "truthy-bool",
]

# Module discovery and import resolution
namespace_packages = true
explicit_package_bases = true
ignore_missing_imports = false
exclude = [
    "(^|/)(build|install|log)/",
    "(^|/)setup\\.py$",
]

[[tool.mypy.overrides]]
# Dependencies that ship no type information (no py.typed marker, no stubs). Without this, mypy raises import-untyped
# and fails; instead we accept Any from these modules. Keep alphabetical.
module = [
    "ament_index_python.*",
    "builtin_interfaces.*",
    "foxglove_msgs.*",
    "geographic_msgs.*",
    "geometry_msgs.*",
    "launch.*",
    "launch_ros.*",
    "maverick_msgs.*",
    "nav_msgs.*",
    "odrive.*",
    "playsound",
    "pyubx2",
    "rclpy.*",
    "robot_localization.*",
    "sensor_msgs.*",
    "std_msgs.*",
    "std_srvs.*",
    "tf2_geometry_msgs.*",
    "tf2_ros.*",
    "visualization_msgs.*",
]
ignore_missing_imports = true
disable_error_code = ["attr-defined"]
